<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonutsMP Market</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background-color: #000; /* dark background */
    color: #fff;
  }

  header {
    background-color: #111;
    text-align: center;
    padding: 20px 10px;
    position: relative;
  }

  header h1 {
    margin: 0;
    font-family: 'Verdana', sans-serif;
  }

  .discord-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background-color: #7289da;
    color: white;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
  }

  .discord-btn:hover {
    background-color: #5b6eae;
  }

  #home {
    text-align: center;
    padding: 60px 20px;
  }

  #home h2 {
    font-size: 36px;
    margin-bottom: 20px;
  }

  #home button {
    background-color: #8d6e63;
    color: white;
    font-size: 20px;
    padding: 15px 25px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  #home button:hover {
    transform: scale(1.1);
  }

  section {
    padding: 20px 10px;
  }

  h2.section-title {
    text-align: center;
    margin-bottom: 20px;
    font-size: 28px;
    color: #ccc;
    text-decoration: underline;
  }

  .categories {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 20px;
  }

  .category {
    background-color: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
  }

  .category:hover {
    background-color: #555;
  }

  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
  }

  .product {
    background-color: #111;
    border-radius: 12px;
    width: 200px;
    text-align: center;
    padding: 15px;
    box-shadow: 0 4px 8px rgba(255,255,255,0.1);
    transition: transform 0.2s;
  }

  .product:hover {
    transform: translateY(-5px);
  }

  .product img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
  }

  .product h3 {
    margin: 10px 0 5px;
    font-size: 18px;
  }

  /* Glowing chest button */
  .buy-btn {
    margin-top: 10px;
    border: none;
    background: none;
    width: 60px;
    height: 60px;
    cursor: pointer;
    animation: glow 2s infinite alternate;
  }

  .buy-btn img {
    width: 100%;
    height: 100%;
    transition: transform 0.2s;
  }

  .buy-btn:hover img {
    transform: scale(1.2) rotateX(20deg);
  }

  @keyframes glow {
    0% {
      filter: drop-shadow(0 0 5px #00ffcc);
    }
    50% {
      filter: drop-shadow(0 0 15px #00ffcc);
    }
    100% {
      filter: drop-shadow(0 0 5px #00ffcc);
    }
  }

  @media (max-width: 600px) {
    .products { flex-direction: column; align-items: center; }
    .categories { flex-direction: column; align-items: center; }
    .discord-btn { position: static; display: inline-block; margin-top: 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>DonutsMP Market</h1>
  <a href="https://discord.gg/5cygXTdGe" class="discord-btn" target="_blank">Join Discord</a>
</header>

<section id="home">
  <h2>Welcome to DonutsMP Market!</h2>
  <button onclick="scrollToShop()">Go to Shop</button>
</section>

<section id="shop">
  <h2 class="section-title">Categories</h2>
  <div class="categories">
    <div class="category" onclick="filterProducts('all')">All</div>
    <div class="category" onclick="filterProducts('farms')">Farms</div>
    <div class="category" onclick="filterProducts('stashes')">Stashes</div>
    <div class="category" onclick="filterProducts('gamblingBases')">Gambling Bases</div>
  </div>

  <div class="products" id="products"></div>
</section>

<script>
function scrollToShop() {
  document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
}

// All products are now fully available
const allProducts = [
  { name: "Kelp Farm", type: "farms", image: "https://i.imgur.com/uD8Qy6N.png" },
  { name: "Bone Block Farm", type: "farms", image: "https://i.imgur.com/7u0Yb2K.png" },
  { name: "Stash", type: "stashes", image: "https://i.imgur.com/2j6nA3H.png" },
  { name: "Gambling Base", type: "gamblingBases", image: "https://i.imgur.com/8q3mCwJ.png" }
];

const productsDiv = document.getElementById("products");

function createProductElement(product) {
  const div = document.createElement("div");
  div.classList.add("product");
  div.setAttribute("data-type", product.type);
  div.innerHTML = `
    <img src="${product.image}" alt="${product.name}">
    <h3>${product.name}</h3>
    <button class="buy-btn" onclick="buyProduct('${product.name}')">
      <img src="https://i.imgur.com/Xo5m6hF.png" alt="Minecraft Chest">
    </button>
  `;
  return div;
}

function renderProducts(filter = 'all') {
  productsDiv.innerHTML = '';
  allProducts.forEach(product => {
    if(filter === 'all' || product.type === filter){
      productsDiv.appendChild(createProductElement(product));
    }
  });
}

function filterProducts(category){
  renderProducts(category);
}

function buyProduct(name){
  alert(`You clicked Buy for ${name}.\nPlease create an order ticket in Discord!`);
}

renderProducts();
</script>

</body>
</html>
