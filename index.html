<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonutsMP Market</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #e0f7fa;
    color: #004d40;
  }

  header {
    background-color: #00796b;
    color: white;
    text-align: center;
    padding: 25px 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    position: relative;
  }

  header h1 {
    margin: 0;
  }

  header p {
    margin: 5px 0 0;
    font-size: 16px;
  }

  /* Discord button at top right */
  .discord-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background-color: #7289da;
    color: white;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
    transition: background-color 0.2s;
  }

  .discord-btn:hover {
    background-color: #5b6eae;
  }

  section {
    padding: 30px 10px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 28px;
    text-decoration: underline;
  }

  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
  }

  .product {
    background-color: #b2dfdb;
    border-radius: 12px;
    width: 220px;
    text-align: center;
    padding: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .product:hover {
    transform: translateY(-5px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.25);
  }

  .product img {
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
  }

  .product h3 {
    margin: 10px 0 5px;
  }

  .product button {
    margin-top: 10px;
    background-color: #00796b;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .product button:hover {
    background-color: #004d40;
  }

  @media (max-width: 600px) {
    .products {
      flex-direction: column;
      align-items: center;
    }

    .discord-btn {
      position: static;
      display: inline-block;
      margin-top: 10px;
    }
  }
</style>
</head>
<body>

<header>
  <h1>DonutsMP Market</h1>
  <p>Click "Buy" to create an order ticket in Discord!</p>
  <a href="https://discord.gg/5cygXTdGe" class="discord-btn" target="_blank">Join Discord</a>
</header>

<!-- Farms Section -->
<section>
  <h2>Farms</h2>
  <div class="products" id="farms"></div>
</section>

<!-- Stashes Section -->
<section>
  <h2>Stashes</h2>
  <div class="products" id="stashes"></div>
</section>

<!-- Gambling Bases Section -->
<section>
  <h2>Gambling Bases</h2>
  <div class="products" id="gamblingBases"></div>
</section>

<script>
  const farms = [
    { name: "Kelp Farm", image: "https://i.imgur.com/uD8Qy6N.png" },
    { name: "Bone Block Farm", image: "https://i.imgur.com/7u0Yb2K.png" }
  ];

  const stashes = [
    { name: "Stash", image: "https://i.imgur.com/2j6nA3H.png" }
  ];

  const gamblingBases = [
    { name: "Gambling Base", image: "https://i.imgur.com/8q3mCwJ.png" }
  ];

  function createProductElement(product) {
    const div = document.createElement("div");
    div.classList.add("product");
    div.innerHTML = `
      <img src="${product.image}" alt="${product.name}">
      <h3>${product.name}</h3>
      <button onclick="buyProduct('${product.name}')">Buy</button>
    `;
    return div;
  }

  function buyProduct(productName) {
    alert(`You clicked Buy for ${productName}.\nPlease create an order ticket in Discord!`);
  }

  const farmsDiv = document.getElementById("farms");
  farms.forEach(farm => farmsDiv.appendChild(createProductElement(farm)));

  const stashesDiv = document.getElementById("stashes");
  stashes.forEach(stash => stashesDiv.appendChild(createProductElement(stash)));

  const gamblingBasesDiv = document.getElementById("gamblingBases");
  gamblingBases.forEach(base => gamblingBasesDiv.appendChild(createProductElement(base)));
</script>

</body>
</html>
