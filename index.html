<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DonutSMP Market</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">
</head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonutSMP Market</title>

<!-- Minecraft font -->
<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Minecraftia', Arial;
    background: #1b1b1b;
    color: #e0e0e0;
}

/* Header */
header {
    background: #3b8526;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    border-bottom: 4px solid #2a5d1a;
}

/* Navigation */
nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    background: #2c2c2c;
    padding: 8px;
}

nav a {
    color: #9be564;
    margin: 5px 10px;
    text-decoration: none;
    font-size: 12px;
}

nav a:hover {
    color: #fff;
}

/* Hero Section */
.hero {
    background: url('https://i.imgur.com/3e5ZQkB.png') center/cover;
    padding: 50px 15px;
    text-align: center;
}

.hero h1 {
    font-size: 22px;
    text-shadow: 2px 2px #000;
}

.hero p {
    font-size: 12px;
}

/* Shop Section */
.section {
    padding: 25px 15px;
    text-align: center;
}

.inventory {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    justify-content: center;
    gap: 10px;
    background: #3c3c3c;
    padding: 20px;
    border: 4px solid #222;
    border-radius: 6px;
    margin: 0 auto;
}

.slot {
    width: 80px;
    height: 80px;
    background: #8b8b8b;
    border: 2px solid #555;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 4px;
}

.slot img {
    max-width: 50px;
}

.slot p {
    font-size: 10px;
    margin: 2px 0 0 0;
}

.slot:hover {
    background: #a0a0a0;
}

/* Admin Panel */
#admin {
    margin-top: 20px;
    padding: 20px;
    background: #2c2c2c;
    border-radius: 6px;
}

#admin input {
    width: 120px;
    margin: 5px;
    padding: 5px;
    font-family: 'Minecraftia';
}

#admin button {
    padding: 5px 10px;
    background: #3b8526;
    border: 2px solid #2a5d1a;
    color: white;
    cursor: pointer;
}

/* Footer */
footer {
    background: #111;
    padding: 10px;
    font-size: 10px;
}

/* Desktop Upgrade */
@media (min-width: 768px) {
    .hero h1 { font-size: 36px; }
    nav a { font-size: 14px; }
}
</style>
</head>

<body>

<header>🍩 DonutSMP Market</header>

<nav>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#contact">Contact</a>
</nav>

<div class="hero">
    <h1>Ultimate DonutSMP Shop</h1>
    <p>Stashes • Skelly Bases • Farms</p>
</div>

<div class="section" id="shop">
    <h2>🧰 Shop</h2>
    <div class="inventory" id="inventory">
        <!-- Products dynamically loaded -->
    </div>

    <!-- Admin Panel to add products -->
    <div id="admin">
        <h3>🔧 Admin Panel</h3>
        <input type="text" id="productName" placeholder="Product Name">
        <input type="text" id="productImage" placeholder="Image URL">
        <button onclick="addProduct()">Add Product</button>
    </div>
</div>

<div class="section" id="contact">
    <h2>📩 Contact</h2>
    <p>Discord: YourServer#1234</p>
</div>

<footer>© 2026 DonutSMP Market</footer>

<script>
// Load products from local storage or default
let products = JSON.parse(localStorage.getItem("products")) || [
    {name: "Stash", image: "https://minecraft.wiki/images/Chest_JE2_BE2.png"},
    {name: "Skelly Base", image: "https://minecraft.wiki/images/Skeleton_Skull_JE2_BE2.png"},
    {name: "Farm", image: "https://minecraft.wiki/images/Wheat_Stage7_JE2_BE2.png"}
];

// Render the inventory
function renderProducts() {
    const inventory = document.getElementById("inventory");
    inventory.innerHTML = "";
    products.forEach(p => {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.innerHTML = `<img src="${p.image}" alt="${p.name}"><p>${p.name}</p>`;
        slot.onclick = () => alert("You selected: " + p.name + "\nDM on Discord to purchase!");
        inventory.appendChild(slot);
    });
}

// Add product from admin panel
function addProduct() {
    const name = document.getElementById("productName").value.trim();
    const image = document.getElementById("productImage").value.trim();
    if(!name || !image) return alert("Fill in both fields!");
    products.push({name, image});
    localStorage.setItem("products", JSON.stringify(products));
    renderProducts();
    document.getElementById("productName").value = "";
    document.getElementById("productImage").value = "";
}

// Initial render
renderProducts();
</script>

</body>
</html>
